<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Bank Exam Prep{% endblock %}</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Cormorant+Garamond:wght@600;700&display=swap");
        :root {
            --bg: #f4eee3;
            --bg-mesh: rgba(13, 108, 96, 0.12);
            --card: rgba(255, 251, 244, 0.9);
            --card-strong: #fffaf1;
            --ink: #1f2b2d;
            --accent: #0d6c60;
            --accent-deep: #0a4f47;
            --accent-soft: rgba(13, 108, 96, 0.12);
            --muted: #6d7774;
            --danger: #a63f31;
            --success: #18794e;
            --border: rgba(117, 107, 85, 0.22);
            --shadow: 0 18px 50px rgba(43, 51, 46, 0.11);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Manrope", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at top right, var(--bg-mesh), transparent 24%),
                radial-gradient(circle at left 20%, rgba(192, 126, 48, 0.12), transparent 28%),
                linear-gradient(180deg, #f8f1e5 0%, var(--bg) 100%);
            color: var(--ink);
        }
        a { color: var(--accent); }
        .page {
            max-width: 1180px;
            margin: 0 auto;
            padding: 32px 20px 64px;
        }
        .site-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 22px;
            padding: 16px 18px;
            border-radius: 26px;
            background: rgba(255, 250, 241, 0.88);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }
        .nav-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .nav-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 11px 16px;
            border-radius: 999px;
            color: var(--accent-deep);
            text-decoration: none;
            font-weight: 800;
            background: rgba(13,108,96,.08);
            border: 1px solid transparent;
            transition: transform .2s ease, background .2s ease, border-color .2s ease;
        }
        .nav-link:hover {
            transform: translateY(-1px);
            background: rgba(13,108,96,.13);
        }
        .nav-link.active {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: white;
            box-shadow: 0 10px 24px rgba(13,108,96,.22);
        }
        .hero {
            display: grid;
            gap: 20px;
            grid-template-columns: 2fr 1fr;
            margin-bottom: 28px;
        }
        .panel {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 28px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
        }
        .pill {
            display: inline-block;
            padding: 7px 14px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .03em;
            margin-right: 8px;
            margin-bottom: 8px;
        }
        h1, h2, h3 {
            margin-top: 0;
            font-family: "Cormorant Garamond", Georgia, serif;
            letter-spacing: -0.02em;
        }
        h1 { font-size: clamp(2.6rem, 4vw, 4.3rem); line-height: .93; }
        h2 { font-size: clamp(1.8rem, 2.4vw, 2.6rem); }
        h3 { font-size: 1.5rem; }
        .grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        }
        form .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,.88);
            font: inherit;
            transition: border-color .2s ease, box-shadow .2s ease, transform .2s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: rgba(13,108,96,.55);
            box-shadow: 0 0 0 4px rgba(13,108,96,.10);
        }
        button, .button {
            display: inline-block;
            border: 0;
            border-radius: 999px;
            padding: 13px 20px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: white;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            box-shadow: 0 10px 24px rgba(13,108,96,.22);
            transition: transform .2s ease, box-shadow .2s ease, opacity .2s ease;
        }
        button:hover, .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(13,108,96,.26);
        }
        .button.secondary {
            background: rgba(255,255,255,.88);
            color: var(--accent-deep);
            border: 1px solid rgba(13,108,96,.16);
            box-shadow: none;
        }
        .muted { color: var(--muted); }
        .stat {
            font-family: "Cormorant Garamond", Georgia, serif;
            font-size: clamp(2rem, 3vw, 3.1rem);
            font-weight: 700;
            line-height: .95;
        }
        .question {
            padding: 18px;
            border-radius: 22px;
            border: 1px solid var(--border);
            margin-bottom: 18px;
            background: rgba(255,255,255,.78);
        }
        .correct { border-color: rgba(24,121,78,.4); background: rgba(24,121,78,.08); }
        .wrong { border-color: rgba(166,63,49,.4); background: rgba(166,63,49,.08); }
        .messages { list-style: none; padding: 0; }
        .messages li {
            padding: 14px 16px;
            border-radius: 16px;
            margin-bottom: 10px;
            background: rgba(26,109,95,.08);
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .profile-shell {
            display: grid;
            gap: 20px;
        }
        .profile-banner {
            position: relative;
            overflow: hidden;
        }
        .profile-banner::after {
            content: "";
            position: absolute;
            inset: auto -10% -30% auto;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(13,108,96,.18) 0%, rgba(13,108,96,0) 68%);
            pointer-events: none;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1.7fr 1fr;
            gap: 20px;
        }
        .micro-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
        }
        .mini-card {
            padding: 18px;
            border-radius: 22px;
            background: linear-gradient(180deg, rgba(255,255,255,.85), rgba(249,243,232,.92));
            border: 1px solid var(--border);
        }
        .kicker {
            text-transform: uppercase;
            letter-spacing: .12em;
            font-size: 11px;
            font-weight: 800;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .profile-name-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 18px;
        }
        .profile-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 16px 0 8px;
        }
        .badge-ghost {
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,.74);
            border: 1px solid var(--border);
            font-size: 14px;
        }
        details.editor {
            margin-top: 20px;
            padding: 18px;
            border-radius: 22px;
            border: 1px dashed rgba(13,108,96,.25);
            background: rgba(255,255,255,.62);
        }
        details.editor summary {
            list-style: none;
            cursor: pointer;
            font-weight: 800;
            color: var(--accent-deep);
        }
        details.editor summary::-webkit-details-marker {
            display: none;
        }
        .progress-rail {
            width: 100%;
            height: 12px;
            border-radius: 999px;
            background: rgba(13,108,96,.10);
            overflow: hidden;
            margin-top: 12px;
        }
        .progress-fill {
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #d08a32 0%, var(--accent) 90%);
        }
        .section-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }
        .link-arrow {
            font-weight: 800;
            text-decoration: none;
        }
        .upload-progress {
            margin-top: 16px;
            display: none;
            padding: 16px;
            border-radius: 18px;
            background: rgba(13,108,96,.08);
            border: 1px solid rgba(13,108,96,.16);
        }
        .upload-progress.visible {
            display: block;
        }
        .upload-progress-bar {
            width: 100%;
            height: 14px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(13,108,96,.12);
            margin: 10px 0 8px;
        }
        .upload-progress-fill {
            height: 100%;
            width: 0%;
            border-radius: inherit;
            background: linear-gradient(90deg, #d08a32 0%, var(--accent) 90%);
            transition: width .2s ease;
        }
        .upload-progress-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            color: var(--muted);
        }
        @media (max-width: 760px) {
            .site-nav {
                flex-direction: column;
                align-items: stretch;
            }
            .nav-links {
                width: 100%;
            }
            .nav-link {
                justify-content: center;
                flex: 1 1 160px;
            }
            .hero { grid-template-columns: 1fr; }
            .profile-grid { grid-template-columns: 1fr; }
            .profile-name-row { align-items: flex-start; }
            .upload-progress-meta { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <div class="page">
        <nav class="site-nav">
            <div class="nav-links">
                {% if request.user.is_authenticated %}
                    <a class="nav-link{% if request.resolver_match.url_name == 'home' %} active{% endif %}" href="{% url 'prep:home' %}">
                        Dashboard
                    </a>
                    <a class="nav-link" href="{% url 'prep:home' %}#start-test">
                        Start New Test
                    </a>
                    <a class="nav-link{% if request.resolver_match.url_name == 'predicted-papers' %} active{% endif %}" href="{% url 'prep:predicted-papers' %}">
                        Predicted Papers
                    </a>
                    <a class="nav-link{% if request.resolver_match.url_name == 'profile' %} active{% endif %}" href="{% url 'prep:profile' %}">
                        Profile
                    </a>
                    <a class="nav-link{% if request.resolver_match.url_name == 'admin-panel' %} active{% endif %}" href="{% url 'prep:admin-panel' %}">
                        Admin Panel
                    </a>
                    <form method="post" action="{% url 'prep:logout' %}" style="margin: 0;">
                        {% csrf_token %}
                        <button class="nav-link" type="submit">Logout</button>
                    </form>
                {% else %}
                    <a class="nav-link{% if request.resolver_match.url_name == 'login' %} active{% endif %}" href="{% url 'prep:login' %}">
                        Login
                    </a>
                {% endif %}
            </div>
        </nav>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
